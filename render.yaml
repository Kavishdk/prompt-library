services:
  - type: web
    name: ai-prompt-library
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: prompt-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: prompt-cache
          property: connectionString

databases:
  - name: prompt-db
    plan: free

redis:
  - name: prompt-cache
    plan: free
